<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inovatus · Mesclar PDFs</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F6F5;
  --surface: #FFFFFF;
  --surface2: #EAF0EE;
  --ink: #1A2420;
  --ink2: #4A6058;
  --ink3: #8AA09A;
  --accent: #2D5C4E;
  --accent2: #3A8C7A;
  --accent-hover: #1E4035;
  --gold: #B8963C;
  --green-light: #E8F2EF;
  --red: #C83A3A;
  --red-light: #FBF0EF;
  --amber: #B8963C;
  --amber-light: #FBF5E8;
  --border: #D0DDD8;
  --radius: 12px;
  --shadow: 0 2px 16px rgba(26,36,32,0.08);
}
* { box-sizing: border-box; }
html, body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:'DM Sans', Arial, sans-serif; font-size:14px; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
h1, h2, h3, .serif { font-family:'DM Serif Display', Georgia, serif; font-weight:400; color:var(--ink); }
.app-shell { display:flex; justify-content:center; min-height:100vh; }
.main { flex:1; padding:48px 36px; max-width:640px; }
.top-brand { font-family:'DM Serif Display', Georgia, serif; font-size:20px; color:var(--ink2); margin-bottom:22px; }
.page-header { margin-bottom:28px; }
.page-header h1 { font-size:30px; margin:0; }
.page-header .subtitle { font-size:13px; color:var(--ink3); margin-top:6px; }
.tab-section { display:none; }
.tab-section.active { display:block; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px 22px; box-shadow:var(--shadow); margin-bottom:16px; }
.card h2 { font-size:20px; margin:0 0 6px 0; }
.card .card-note { font-size:12.5px; color:var(--ink3); margin-bottom:16px; }
.btn { display:inline-flex; align-items:center; gap:8px; padding:10px 18px; border-radius:8px; font-family:'DM Sans', sans-serif; font-size:13px; font-weight:500; border:none; cursor:pointer; transition:all .15s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover:not(:disabled) { background:var(--accent-hover); }
.btn-primary:disabled { background:var(--border); color:var(--ink3); cursor:not-allowed; }
.btn-ghost { background:transparent; color:var(--ink2); border:1px solid var(--border); }
.btn-ghost:hover { background:var(--surface2); }
.dropzone { background:var(--surface2); border:2px dashed var(--border); border-radius:var(--radius); padding:30px 20px; text-align:center; cursor:pointer; transition:border-color .15s, background .15s; }
.dropzone.dragover { border-color:var(--accent2); background:var(--green-light); }
.dropzone p { margin:0; color:var(--ink2); font-size:13.5px; }
.dropzone strong { color:var(--ink); }
input[type="file"] { display:none; }
.file-list { margin-top:16px; display:flex; flex-direction:column; gap:8px; }
.file-item { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 12px; display:flex; align-items:center; gap:10px; cursor:grab; }
.file-item.dragging { opacity:.4; }
.file-item .handle { color:var(--ink3); font-size:14px; user-select:none; }
.file-item .order { background:var(--surface2); color:var(--accent); font-size:11px; font-weight:700; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.file-item .name { flex:1; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.file-item .remove { background:none; border:none; color:var(--ink3); cursor:pointer; font-size:15px; line-height:1; padding:4px; }
.file-item .remove:hover { color:var(--red); }
label { display:block; font-size:12px; font-weight:600; color:var(--ink2); text-transform:uppercase; letter-spacing:.07em; margin-bottom:6px; }
input, select, textarea { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px; font-family:'DM Sans', sans-serif; font-size:14px; color:var(--ink); background:var(--bg); outline:none; transition:border-color .15s; }
input:focus, select:focus, textarea:focus { border-color:var(--accent); background:#fff; }
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:99px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
.badge-green { background:var(--green-light); color:var(--accent); }
.badge-red { background:var(--red-light); color:var(--red); }
.badge-amber { background:var(--amber-light); color:var(--gold); }
.badge-gray { background:var(--surface2); color:var(--ink2); }
.alert { display:flex; align-items:flex-start; gap:12px; padding:14px 16px; border-radius:10px; margin-bottom:16px; font-size:13px; }
.alert-amber { background:var(--amber-light); color:#8A6010; border:1px solid #E8C86A; }
.alert-red { background:var(--red-light); color:#8A2020; border:1px solid #E87A7A; }
.alert-green { background:var(--green-light); color:var(--accent-hover); border:1px solid #BEE0D6; }
.status-line { margin-top:14px; font-size:13px; color:var(--ink2); min-height:18px; }
.status-line.error { color:var(--red); }
.status-line.success { color:var(--accent); }
.summary-box { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-top:14px; font-size:13px; }
.summary-box ul { margin:6px 0 0; padding-left:18px; }
.summary-box li { margin-bottom:4px; }
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
.filerow-actions { display:flex; gap:10px; margin-top:18px; }
.page-footer { text-align:center; margin-top:20px; font-size:11px; color:var(--ink3); }
@media (max-width:860px) {
  .main { padding:20px; }
}
</style>
</head>
<body>
<div class="app-shell">
  <main class="main">

    <div class="top-brand">Inovatus</div>

    <section id="tab-mesclar" class="tab-section active">
      <div class="page-header">
        <h1>Mesclar PDFs</h1>
        <div class="subtitle">Junta os PDFs iniciais em um único arquivo, na ordem que você definir.</div>
      </div>
      <div class="card">
        <div class="dropzone" id="mesclarDropzone">
          <p><strong>Clique para escolher</strong> ou arraste os PDFs aqui</p>
          <input type="file" id="mesclarFileInput" accept="application/pdf" multiple>
        </div>
        <div class="file-list" id="mesclarList"></div>
        <div class="filerow-actions">
          <button class="btn btn-ghost" id="mesclarClearBtn" style="display:none;">Limpar</button>
          <button class="btn btn-primary" id="mesclarMergeBtn" disabled>Mesclar e baixar</button>
        </div>
        <div class="status-line" id="mesclarStatus"></div>
      </div>
      <div class="page-footer">Pré-análise REF · ferramentas locais — nenhum arquivo sai do seu navegador.</div>
    </section>

  </main>
</div>

<script>
/* ======================= MESCLAR PDFS ======================= */
var mesclarFiles = [];
var mesclarDragSrcIndex = null;

var mesclarDropzone = document.getElementById('mesclarDropzone');
var mesclarFileInput = document.getElementById('mesclarFileInput');
var mesclarListEl = document.getElementById('mesclarList');
var mesclarMergeBtn = document.getElementById('mesclarMergeBtn');
var mesclarClearBtn = document.getElementById('mesclarClearBtn');
var mesclarStatusEl = document.getElementById('mesclarStatus');

mesclarDropzone.addEventListener('click', function () { mesclarFileInput.click(); });
mesclarDropzone.addEventListener('dragover', function (e) { e.preventDefault(); mesclarDropzone.classList.add('dragover'); });
mesclarDropzone.addEventListener('dragleave', function () { mesclarDropzone.classList.remove('dragover'); });
mesclarDropzone.addEventListener('drop', function (e) {
  e.preventDefault();
  mesclarDropzone.classList.remove('dragover');
  mesclarAddFiles(Array.from(e.dataTransfer.files).filter(function (f) { return f.type === 'application/pdf'; }));
});
mesclarFileInput.addEventListener('change', function (e) {
  mesclarAddFiles(Array.from(e.target.files));
  mesclarFileInput.value = '';
});

function mesclarAddFiles(newFiles) {
  mesclarFiles = mesclarFiles.concat(newFiles);
  mesclarRenderList();
  mesclarSetStatus('');
}

function mesclarRenderList() {
  mesclarListEl.innerHTML = '';
  mesclarFiles.forEach(function (file, index) {
    var item = document.createElement('div');
    item.className = 'file-item';
    item.draggable = true;
    item.dataset.index = index;
    item.innerHTML =
      '<span class="handle">&#10247;</span>' +
      '<span class="order">' + (index + 1) + '</span>' +
      '<span class="name"></span>' +
      '<button class="remove" title="Remover">&#10005;</button>';
    item.querySelector('.name').textContent = file.name;

    item.addEventListener('dragstart', function () {
      mesclarDragSrcIndex = index;
      item.classList.add('dragging');
    });
    item.addEventListener('dragend', function () { item.classList.remove('dragging'); });
    item.addEventListener('dragover', function (e) { e.preventDefault(); });
    item.addEventListener('drop', function (e) {
      e.preventDefault();
      var targetIndex = Number(item.dataset.index);
      if (mesclarDragSrcIndex === null || mesclarDragSrcIndex === targetIndex) return;
      var moved = mesclarFiles.splice(mesclarDragSrcIndex, 1)[0];
      mesclarFiles.splice(targetIndex, 0, moved);
      mesclarRenderList();
    });

    item.querySelector('.remove').addEventListener('click', function () {
      mesclarFiles.splice(index, 1);
      mesclarRenderList();
    });

    mesclarListEl.appendChild(item);
  });

  mesclarMergeBtn.disabled = mesclarFiles.length < 2;
  mesclarClearBtn.style.display = mesclarFiles.length ? 'block' : 'none';
}

mesclarClearBtn.addEventListener('click', function () {
  mesclarFiles = [];
  mesclarRenderList();
  mesclarSetStatus('');
});

mesclarMergeBtn.addEventListener('click', function () {
  mesclarSetStatus('Mesclando...', '');
  mesclarMergeBtn.disabled = true;

  var PDFDocument = PDFLib.PDFDocument;

  (async function () {
    try {
      var mergedPdf = await PDFDocument.create();
      for (var i = 0; i < mesclarFiles.length; i++) {
        var file = mesclarFiles[i];
        var bytes = await file.arrayBuffer();
        var pdf = await PDFDocument.load(bytes);
        var pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
        pages.forEach(function (page) { mergedPdf.addPage(page); });
      }
      var mergedBytes = await mergedPdf.save();
      var blob = new Blob([mergedBytes], { type: 'application/pdf' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'mesclado.pdf';
      a.click();
      URL.revokeObjectURL(url);
      mesclarSetStatus('PDF gerado e baixado com sucesso.', 'success');
    } catch (err) {
      console.error(err);
      mesclarSetStatus('Erro ao mesclar: ' + err.message, 'error');
    } finally {
      mesclarMergeBtn.disabled = mesclarFiles.length < 2;
    }
  })();
});

function mesclarSetStatus(msg, type) {
  mesclarStatusEl.textContent = msg;
  mesclarStatusEl.className = 'status-line' + (type ? ' ' + type : '');
}
</script>

</body>
</html>
